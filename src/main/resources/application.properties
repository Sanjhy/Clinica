# ===================================================================
# CONFIGURACIÓN DE CONEXIÓN A MYSQL (LOCAL)
# ===================================================================

# Puerto de la aplicación web
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/cam_pucallpa?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&useInformationSchema=true
spring.datasource.username=sanjhy
spring.datasource.password=num123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE (CREACIÓN AUTOMÁTICA)
# ===================================================================

spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL reales en la consola para auditoría
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desactivar el filtro OpenSessionInView por rendimiento
spring.jpa.open-in-view=false

# Dialecto para MariaDB
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ===================================================================
# CONFIGURACIÓN JWT
# ===================================================================

# Clave secreta de al menos 256 bits para HS256 (cámbiala en producción)
app.jwt.secret=CAMPucallya2024SecretKeyParaJWTQueDebeTenerMinimo256Bits!!
# Expiración del token: 24 horas en milisegundos
app.jwt.expiration-ms=86400000